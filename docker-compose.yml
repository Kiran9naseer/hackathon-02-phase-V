version: '3.8'

services:
  # Backend Service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    ports:
      - "8000:7860"
    environment:
      # Database
      - DATABASE_URL=sqlite:///./data/todo.db
      
      # JWT Settings
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      
      # CORS Settings
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      
      # Google OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      
      # Gemini API (for AI features)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      # Persist database
      - backend-data:/app/data
      # Mount code for development (comment out for production)
      # - ./backend:/app
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "3000:3000"
    environment:
      # Backend API URL
      - NEXT_PUBLIC_API_URL=http://localhost:8000

      # Better Auth (if used)
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-your-better-auth-secret}
      - BETTER_AUTH_URL=http://localhost:3000

      # Google OAuth (optional)
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todo-network
    restart: unless-stopped

  # Kafka Service (Phase V - Event Streaming)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:9094"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT://0.0.0.0:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_JMX_PORT: "9101"
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      KAFKA_BROKER_ID: "1"
      KAFKA_CONTROLLER_SERVER_PORT: "9093"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Service (Phase V - Search Caching)
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - todo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Dapr Placement Service
  dapr-placement:
    image: "daprio/dapr:1.12.0"
    command: ["./placement", "-port", "50005"]
    container_name: dapr-placement
    ports:
      - "50005:50005"
    networks:
      - todo-network

  # Dapr Sidecar for local backend
  dapr-sidecar:
    image: "daprio/daprd:1.12.0"
    command: [
      "./daprd",
      "--app-id", "todo-backend",
      "--dapr-http-port", "3500",
      "--dapr-grpc-port", "50001",
      "--placement-host-address", "dapr-placement:50005",
      "--resources-path", "/components",
      "--log-level", "debug"
    ]
    container_name: dapr-sidecar
    volumes:
      - ./dapr/components:/components
    ports:
      - "3500:3500"
      - "50001:50001"
    depends_on:
      - redis
      - dapr-placement
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  backend-data:
    driver: local
  kafka-data:
    driver: local
  redis-data:
    driver: local
